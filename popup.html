<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      font-family: Arial, sans-serif;
      padding: 15px;
      margin: 0;
      background-color: #f9f9f9;
    }
    h4 {
      margin-top: 0;
      margin-bottom: 15px;
      color: #333;
    }
    label {
      font-size: 12px;
      color: #555;
      margin-bottom: 4px;
      display: block;
    }
    select, input, button {
      width: 100%;
      margin-bottom: 12px;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background: #0056b3;
    }
    .solve-btn {
      background: #28a745;
      margin-bottom: 0;
    }
    .solve-btn:hover {
      background: #218838;
    }
    hr {
      border: 0;
      border-top: 1px solid #ddd;
      margin: 15px 0;
    }
  </style>
</head>
<body>
  <h4>AI Solver Settings</h4>
  
  <label for="provider">AI Provider</label>
  <select id="provider">
    <option value="gemini">Google Gemini</option>
    <option value="openai">OpenAI (ChatGPT)</option>
    <option value="grok">Grok (xAI)</option>
    <option value="mistral">Mistral</option>
    <option value="local">Local LLM (Ollama/LMStudio)</option>
  </select>

  <label for="apiKey">API Key (Leave blank for Local LLM)</label>
  <input type="password" id="apiKey" placeholder="Enter API Key">

  <button id="saveBtn">Save Settings</button>
  
  <hr>
  
  <button id="solveBtn" class="solve-btn">Solve Current Page</button>

  <script src="popup.js"></script>
</body>
</html>
